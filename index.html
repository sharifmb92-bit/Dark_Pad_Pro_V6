<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"DARK PAD PRO V5","short_name":"DP Pro","start_url":".","display":"standalone","background_color":"#050a0f","theme_color":"#050a0f"}'>
    
    <title>Dark Pad Pro V5 - Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #050a0f; color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; transition: background 0.3s; }
        .bg-pure-black { background-color: #000000 !important; }
        
        /* Paleta de Colores Profesionales */
        .bg-dark-gray { background-color: #1c2833 !important; } /* Tu Gris Especial */
        .bg-dark-orange { background-color: #5d340b !important; }
        .bg-dark-blue { background-color: #153e5a !important; }
        .bg-dark-green { background-color: #145a32 !important; }
        .bg-dark-purple { background-color: #3b1c4a !important; }
        .bg-dark-red { background-color: #641e16 !important; }
        .bg-dark-teal { background-color: #0d3b31 !important; }
        .bg-dark-indigo { background-color: #1e1b4b !important; }

        .note-card { position: relative; border-radius: 1.5rem; height: 160px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .is-pinned { border: 2px solid #f97316 !important; box-shadow: 0 0 15px rgba(249,115,22,0.2); }
        .quick-info-btn { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.4); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(4px); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        textarea { background: transparent !important; color: white !important; width: 100%; height: 350px; border: none; outline: none; padding: 2rem; resize: none; font-weight: 500; line-height: 1.6; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" :class="config.pureBlack ? 'bg-pure-black' : ''">

    <header class="p-6 pb-2 border-b border-white/5 sticky top-0 z-50 bg-inherit">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-black text-orange-500 italic uppercase tracking-tighter">Dark Pad</h1>
                <p class="text-[9px] font-black text-sky-500 uppercase tracking-widest" x-text="selectedDate ? 'Filtrando por fecha' : 'Registros Pro'"></p>
            </div>
            <button @click="showSettings = true" class="p-2 bg-white/5 rounded-full active:scale-90 transition-transform">
                <span class="material-symbols-outlined text-sky-400">settings</span>
            </button>
        </div>
        
        <div class="relative mb-2">
            <span class="material-symbols-outlined absolute left-3 top-2.5 text-[16px] opacity-30">search</span>
            <input x-model="search" type="text" placeholder="Buscar en mis notas..." 
                   class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-10 pr-4 text-xs focus:border-sky-500 outline-none transition-all">
        </div>
    </header>

    <section class="px-6 py-3 bg-white/5 overflow-x-auto whitespace-nowrap hide-scrollbar border-b border-white/5">
        <div class="flex gap-4">
            <template x-for="day in last7Days" :key="day.date">
                <div @click="filterByDate(day.date)" 
                     class="flex flex-col items-center min-w-[45px] p-2.5 rounded-2xl transition-all active:scale-90"
                     :class="selectedDate === day.date ? 'bg-sky-500 text-white' : 'bg-white/5'">
                    <span class="text-[8px] uppercase font-black opacity-50" x-text="day.name"></span>
                    <span class="text-sm font-black" x-text="day.num"></span>
                    <div x-show="day.hasNote" class="w-1 h-1 rounded-full mt-1" :class="selectedDate === day.date ? 'bg-white' : 'bg-orange-500'"></div>
                </div>
            </template>
        </div>
    </section>

    <main class="p-4 grid grid-cols-2 gap-4 h-[calc(100vh-230px)] overflow-y-auto pb-32 hide-scrollbar">
        <template x-for="nota in notasFiltradas" :key="nota.id">
            <div class="note-card p-5 flex flex-col justify-between active:scale-95" 
                 :class="[nota.estilo, nota.pinned ? 'is-pinned' : '']"
                 @click="abrirNota(nota)">
                
                <button @click.stop="consultarRapido(nota)" class="quick-info-btn">
                    <span class="material-symbols-outlined text-white text-[16px]">info</span>
                </button>

                <p class="font-bold line-clamp-4 text-white/95 leading-tight tracking-tight" 
                   :style="{ fontSize: config.fontSize + 'px' }" x-text="nota.texto || 'Nota vacía...'"></p>
                
                <div class="flex justify-between items-center opacity-40 text-[9px] font-black uppercase">
                    <span x-text="nota.fecha"></span>
                    <span x-show="nota.pinned" class="material-symbols-outlined text-[12px]">push_pin</span>
                </div>
            </div>
        </template>
    </main>

    <div x-show="showSettings" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0" x-cloak class="fixed inset-0 bg-[#050a0f] z-[300] p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black text-white uppercase italic">Configuración</h2>
            <button @click="showSettings = false" class="bg-sky-500 text-white px-6 py-2 rounded-full font-black text-xs uppercase tracking-widest">Listo</button>
        </div>

        <div class="space-y-4">
            <div class="bg-white/5 p-5 rounded-3xl border border-white/10 flex justify-between items-center">
                <div>
                    <p class="font-bold text-white">Negro Puro</p>
                    <p class="text-[10px] opacity-40 uppercase font-black">Optimizado para AMOLED</p>
                </div>
                <button @click="config.pureBlack = !config.pureBlack" class="w-14 h-7 rounded-full p-1 transition-colors" :class="config.pureBlack ? 'bg-sky-500' : 'bg-white/10'">
                    <div class="w-5 h-5 bg-white rounded-full transition-transform" :class="config.pureBlack ? 'translate-x-7' : 'translate-x-0'"></div>
                </button>
            </div>
        </div>
    </div>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="w-full max-w-lg rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl" :class="notaExpandida?.estilo">
            <div class="p-6 flex justify-between items-center border-b border-white/10">
                <div class="flex gap-4">
                    <button @click="notaExpandida.pinned = !notaExpandida.pinned" :class="notaExpandida?.pinned ? 'text-orange-400' : 'text-white/30'">
                        <span class="material-symbols-outlined">push_pin</span>
                    </button>
                </div>
                <button @click="cerrarNota()" class="w-10 h-10 bg-black/20 rounded-full flex items-center justify-center text-white"><span class="material-symbols-outlined">close</span></button>
            </div>
            <textarea x-model="notaExpandida.texto" id="editor" @input.debounce.500ms="guardar()" :style="{ fontSize: config.fontSize + 'px' }"></textarea>
            <div class="p-6 flex justify-between items-center bg-black/20">
                <span class="text-[10px] font-black opacity-40 text-white uppercase" x-text="notaExpandida?.fecha"></span>
                <button @click="borrarNota()" class="text-[10px] font-black text-red-400 uppercase">Eliminar Nota</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-8 right-6 z-[100]">
        <button @click="nuevaNota()" class="w-16 h-16 bg-orange-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-orange-900/40 active:scale-90 transition-transform">
            <span class="material-symbols-outlined text-black font-black text-4xl">add</span>
        </button>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [], notaExpandida: null, search: '', selectedDate: null, showSettings: false,
                config: { fontSize: 18, pureBlack: false },
                estilos: ['bg-dark-gray', 'bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple', 'bg-dark-red', 'bg-dark-teal', 'bg-dark-indigo'],

                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_pro_v5_fix') || '[]');
                    this.config = JSON.parse(localStorage.getItem('darkpad_config') || JSON.stringify(this.config));
                    
                    document.addEventListener('visibilitychange', () => { 
                        if(document.visibilityState === 'hidden') this.guardar(); 
                    });
                },

                get notasFiltradas() {
                    return this.notas.filter(n => {
                        const matchesSearch = n.texto.toLowerCase().includes(this.search.toLowerCase());
                        const matchesDate = !this.selectedDate || n.fecha.includes(this.selectedDate);
                        return matchesSearch && matchesDate;
                    }).sort((a,b) => b.pinned - a.pinned || b.id - a.id);
                },

                get last7Days() {
                    const days = [];
                    for(let i=0; i<7; i++) {
                        const d = new Date(); d.setDate(d.getDate() - i);
                        const dateStr = d.toLocaleDateString([], {day:'2-digit', month:'2-digit'});
                        days.push({
                            date: dateStr,
                            num: d.getDate(),
                            name: d.toLocaleDateString([], {weekday:'short'}),
                            hasNote: this.notas.some(n => n.fecha.includes(dateStr))
                        });
                    }
                    return days;
                },

                filterByDate(date) {
                    this.selectedDate = (this.selectedDate === date) ? null : date;
                },

                consultarRapido(nota) {
                    alert(`VISTA RÁPIDA (${nota.fecha}):\n\n${nota.texto || '(Sin texto)'}`);
                },

                nuevaNota() {
                    const ahora = new Date();
                    // Selector Aleatorio de Colores
                    const colorAleatorio = this.estilos[Math.floor(Math.random() * this.estilos.length)];
                    
                    const n = { 
                        id: Date.now(), 
                        texto: '', 
                        fecha: ahora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ' + ahora.toLocaleDateString([], {day:'2-digit', month:'2-digit'}), 
                        estilo: colorAleatorio, 
                        pinned: false,
                        reminder: false 
                    };
                    this.notas.unshift(n);
                    this.abrirNota(n);
                },

                abrirNota(n) { 
                    this.notaExpandida = n;
                    setTimeout(() => {
                        const el = document.getElementById('editor');
                        if(el) el.focus();
                    }, 300);
                },

                cerrarNota() { this.guardar(); this.notaExpandida = null; },
                
                guardar() { 
                    localStorage.setItem('darkpad_pro_v5_fix', JSON.stringify(this.notas)); 
                    localStorage.setItem('darkpad_config', JSON.stringify(this.config));
                },

                borrarNota() { 
                    if(confirm("¿Seguro que quieres eliminar esta nota?")) { 
                        this.notas = this.notas.filter(n => n.id !== this.notaExpandida.id); 
                        this.cerrarNota(); 
                    } 
                }
            }
        }
    </script>
</body>
</html>
